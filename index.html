<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 번역기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #ffeef3 0%, #ffc7d8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .history-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .history-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .content { padding: 40px; }
        .section {
            margin-bottom: 50px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 25px;
            background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%);
            border-radius: 2px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.3s ease;
            background: #fafbfc;
        }
        textarea:focus {
            outline: none;
            border-color: #ff9fc7;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 159, 199, 0.1);
        }
        .btn {
            background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 159, 199, 0.3);
            width: 100%;
            margin: 20px 0 0;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 159, 199, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-container {
            background: #fef7f9;
            border-radius: 12px;
            padding: 20px 60px 20px 20px;
            margin-top: 20px;
            position: relative;
            border-left: 4px solid #ff9fc7;
            min-height: 60px;
        }
        .result-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #cc4f82;
            margin-bottom: 8px;
        }
        .result-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 159, 199, 0.1);
            border: 1px solid rgba(255, 159, 199, 0.3);
            color: #cc4f82;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .copy-btn:hover {
            background: #ff9fc7;
            color: white;
        }
        .dual-result {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 { font-size: 1.5rem; }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        .modal-body {
            padding: 30px;
            overflow-y: auto;
            flex-grow: 1;
        }
        .history-item {
            background: #fef7f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9fc7;
        }
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-date {
            font-size: 0.9rem;
            color: #666;
        }
        .history-type {
            background: #ff9fc7;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .history-text-block { margin-bottom: 12px; }
        .history-text-block strong {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .history-text-block div {
            padding: 10px;
            background: rgba(255,255,255,0.7);
            border-radius: 6px;
            word-break: break-word;
            line-height: 1.5;
            color: #555;
            white-space: pre-wrap;
        }
        .clear-history-btn {
            background: #ff6666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .clear-history-btn:hover { background: #ff4444; }
        @media (max-width: 768px) {
            body { padding: 0; }
            .container { margin: 0; border-radius: 0; min-height: 100vh; }
            .header { padding: 20px; }
            .header h1 { font-size: 2rem; }
            .history-btn { position: static; margin-top: 15px; display: inline-block; }
            .content { padding: 20px; }
            .section { padding: 22px; }
            .dual-result { grid-template-columns: 1fr; }
            .modal-content { width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>스마트 번역기</h1>
            <p>중국어, 영어, 한국어를 빠르게 번역하세요</p>
            <button class="history-btn" onclick="showHistory()">히스토리</button>
        </header>

        <main class="content">
            <section class="section">
                <div class="section-title">중국어/영어 → 한국어</div>
                <textarea id="topInput" placeholder="중국어 또는 영어를 입력하세요."></textarea>
                <button id="topTranslateBtn" class="btn" onclick="translateToKorean()">한국어로 번역</button>
                <div id="topResult" class="result-container" style="display: none;">
                    <div class="result-label">한국어</div>
                    <div id="topResultText" class="result-text"></div>
                    <button class="copy-btn" onclick="copyText('topResultText', this)">복사</button>
                </div>
            </section>

            <section class="section">
                <div class="section-title">한국어 → 영어/중국어</div>
                <textarea id="bottomInput" placeholder="한국어를 입력하세요."></textarea>
                <button id="bottomTranslateBtn" class="btn" onclick="translateFromKorean()">영어/중국어로 번역</button>
                <div id="bottomResult" class="dual-result" style="display: none;">
                    <div class="result-container">
                        <div class="result-label">영어</div>
                        <div id="englishResult" class="result-text"></div>
                        <button class="copy-btn" onclick="copyText('englishResult', this)">복사</button>
                    </div>
                    <div class="result-container">
                        <div class="result-label">중국어 간체</div>
                        <div id="chineseResult" class="result-text"></div>
                        <button class="copy-btn" onclick="copyText('chineseResult', this)">복사</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>번역 히스토리</h2>
                <button class="close-btn" onclick="closeHistory()" aria-label="닫기">×</button>
            </header>
            <div class="modal-body">
                <div id="historyContent"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/translate';

        class TranslationHistory {
            constructor() {
                this.storageKey = 'translationHistory';
                this.maxItems = 100;
            }

            add(item) {
                let history = this.getAll();
                history.unshift({
                    timestamp: new Date().toISOString(),
                    ...item
                });
                history = history.slice(0, this.maxItems);
                localStorage.setItem(this.storageKey, JSON.stringify(history));
            }

            getAll() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                } catch {
                    return [];
                }
            }

            clear() {
                localStorage.removeItem(this.storageKey);
            }
        }

        const historyStore = new TranslationHistory();

        function detectLanguage(text) {
            if (/[\u4E00-\u9FFF]/.test(text)) return 'zh-Hans';
            if (/[\uAC00-\uD7AF]/.test(text)) return 'ko';
            if (/[a-zA-Z]/.test(text)) return 'en';
            return 'auto';
        }

        async function callTranslateAPI(text, from, to) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text, from, to })
            });

            let data;
            try {
                data = await response.json();
            } catch {
                throw new Error('API 응답을 읽을 수 없습니다.');
            }

            if (!response.ok || !data.success) {
                throw new Error(data.error || `API 오류: ${response.status}`);
            }

            return data.translatedText;
        }

        async function translateToKorean() {
            const text = document.getElementById('topInput').value.trim();
            if (!text) {
                alert('번역할 텍스트를 입력하세요.');
                return;
            }

            const btn = document.getElementById('topTranslateBtn');
            btn.disabled = true;
            btn.textContent = '번역 중...';

            try {
                const sourceLang = detectLanguage(text);
                const result = await callTranslateAPI(text, sourceLang, 'ko');

                document.getElementById('topResultText').textContent = result;
                document.getElementById('topResult').style.display = 'block';

                historyStore.add({
                    sourceLanguage: sourceLang,
                    targetLanguage: 'ko',
                    originalText: text,
                    translatedText: result
                });
            } catch (error) {
                alert('번역 중 오류: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '한국어로 번역';
            }
        }

        async function translateFromKorean() {
            const text = document.getElementById('bottomInput').value.trim();
            if (!text) {
                alert('번역할 텍스트를 입력하세요.');
                return;
            }

            const btn = document.getElementById('bottomTranslateBtn');
            btn.disabled = true;
            btn.textContent = '번역 중...';

            try {
                const [englishResult, chineseResult] = await Promise.all([
                    callTranslateAPI(text, 'ko', 'en'),
                    callTranslateAPI(text, 'ko', 'zh-Hans')
                ]);

                document.getElementById('englishResult').textContent = englishResult;
                document.getElementById('chineseResult').textContent = chineseResult;
                document.getElementById('bottomResult').style.display = 'grid';

                historyStore.add({
                    sourceLanguage: 'ko',
                    targetLanguage: 'en, zh-Hans',
                    originalText: text,
                    englishTranslation: englishResult,
                    chineseTranslation: chineseResult
                });
            } catch (error) {
                alert('번역 중 오류: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '영어/중국어로 번역';
            }
        }

        async function copyText(elementId, button) {
            const element = document.getElementById(elementId);
            const text = element.textContent || element.innerText;
            if (!text.trim()) {
                alert('복사할 내용이 없습니다.');
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                button.textContent = '복사됨';
                setTimeout(() => {
                    button.textContent = '복사';
                }, 2000);
            } catch {
                alert('복사에 실패했습니다.');
            }
        }

        function showHistory() {
            const modal = document.getElementById('historyModal');
            const content = document.getElementById('historyContent');
            const historyData = historyStore.getAll();

            if (historyData.length === 0) {
                content.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;"><p>아직 번역 기록이 없습니다.</p></div>';
            } else {
                const html = historyData.map(item => {
                    const date = new Date(item.timestamp).toLocaleString('ko-KR');
                    return `
                        <div class="history-item">
                            <div class="history-item-header">
                                <span class="history-date">${date}</span>
                                <span class="history-type">${escapeHtml(item.sourceLanguage)} → ${escapeHtml(item.targetLanguage)}</span>
                            </div>
                            <div class="history-text-block">
                                <strong>원문</strong>
                                <div>${escapeHtml(item.originalText)}</div>
                            </div>
                            ${item.translatedText ? `
                                <div class="history-text-block">
                                    <strong>번역</strong>
                                    <div>${escapeHtml(item.translatedText)}</div>
                                </div>
                            ` : ''}
                            ${item.englishTranslation ? `
                                <div class="history-text-block">
                                    <strong>영어</strong>
                                    <div>${escapeHtml(item.englishTranslation)}</div>
                                </div>
                            ` : ''}
                            ${item.chineseTranslation ? `
                                <div class="history-text-block">
                                    <strong>중국어 간체</strong>
                                    <div>${escapeHtml(item.chineseTranslation)}</div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');

                content.innerHTML = html + '<button class="clear-history-btn" onclick="clearAllHistory()">히스토리 전체 삭제</button>';
            }

            modal.style.display = 'block';
        }

        function escapeHtml(unsafe) {
            return String(unsafe)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function clearAllHistory() {
            if (confirm('모든 히스토리를 삭제하시겠습니까?')) {
                historyStore.clear();
                showHistory();
            }
        }

        function closeHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('historyModal');
            if (event.target === modal) {
                closeHistory();
            }
        };
    </script>
</body>
</html>
