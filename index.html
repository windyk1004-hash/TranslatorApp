<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 번역 앱</title>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.20.0/dist/pinyin-pro.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #ffeef3 0%, #ffc7d8 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); overflow: hidden; }
        
        /* 줄 바꿈 유지 및 텍스트 스타일 */
        .result-text { 
            font-size: 1.1rem; line-height: 1.6; color: #333; 
            white-space: pre-wrap; /* 줄 바꿈 및 공백 유지 */
            word-break: break-all;  /* 긴 단어 강제 줄 바꿈 */
        }

        .header { background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%); color: white; padding: 30px; text-align: center; }
        .section { margin: 20px; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .btn { background: linear-gradient(135deg, #ff9fc7 0%, #ffb3d1 100%); color: white; border: none; padding: 15px 30px; border-radius: 50px; width: 100%; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .result-container { background: #fef7f9; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 4px solid #ff9fc7; }
        .pinyin-text { font-size: 0.9rem; color: #777; margin-top: 8px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header"><h1>🌍 나만의 번역 앱</h1></header>

        <main class="content">
            <section class="section">
                <textarea id="bottomInput" style="width:100%; height:100px;"></textarea>
                <button id="bottomTranslateBtn" class="btn" onclick="translateFromKorean()">영어/중국어로 번역</button>
                
                <div id="bottomResult" class="result-container" style="display: none;">
                    <div id="englishResult" class="result-text"></div>
                    <div id="chineseResult" class="result-text" style="margin-top:10px;"></div>
                    <div id="chinesePinyin" class="pinyin-text"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function translateFromKorean() {
            const text = document.getElementById('bottomInput').value.trim();
            // (생략: 기존 google.script.run 호출 부분은 그대로 두세요)
            
            // 번역 성공 핸들러 내부에서 병원 처리:
            google.script.run.withSuccessHandler(function(result) {
                document.getElementById('englishResult').textContent = result.englishTranslation;
                document.getElementById('chineseResult').textContent = result.chineseTranslation;
                
                // pinyin-pro를 이용한 병음 생성 (로컬 처리)
                const pinyinResult = pinyinPro.pinyin(result.chineseTranslation, { toneType: 'num' });
                document.getElementById('chinesePinyin').textContent = `[${pinyinResult}]`;
                
                document.getElementById('bottomResult').style.display = 'block';
            }).translateFromKorean(text);
        }
    </script>
</body>
</html>
